[env]
TERM = "alacritty"

[font]
size = 12
offset = { x = 1, y = 1 }
normal = { family = "Hack Nerd Font", style="Regular" }
bold = { family = "Hack Nerd Font", style="Bold" }
italic = { family = "Hack Nerd Font", style="Italic" }
bold_italic = { family = "Hack Nerd Font", style="Bold Italic" }

[window]
padding = { x = 4, y = 4 }
opacity = 0.95

[colors]
# Default colors
primary = { background = "#2E3440", foreground = "#C8D0E0" }

# Normal colors
normal = { black = "#3B4252", red = "#BF616A", green = "#A3BE8C", yellow = "#EBCB8B", blue = "#81A1C1", magenta = "#B988B0", cyan = "#88C0D0", white = "#E5E9F0" }

# Bright colors
bright = { black = "#4C566A", red = "#BF616A", green = "#A3BE8C", yellow = "#EBCB8B", blue = "#81A1C1", magenta = "#B988B0", cyan = "#8FBCBB", white = "#ECEFF4"}

search = { matches = { foreground = "#81A1C1", background = "#4C566A"}, focused_match = { foreground = "#EBCB8B", background = "#4C566A"} }

hints = { start = { foreground = "#B988B0", background = "#4C566A"}, end = { foreground = "#81A1C1", background = "#4C566A"} }

selection = { text = "CellForeground", background = "#3F4758" }
