[env]
TERM = "alacritty"

[terminal]
shell = "/usr/bin/fish"

[font]
size = 12
offset = { x = 1, y = 1 }
normal = { family = "Hack Nerd Font", style="Regular" }
bold = { family = "Hack Nerd Font", style="Bold" }
italic = { family = "Hack Nerd Font", style="Italic" }
bold_italic = { family = "Hack Nerd Font", style="Bold Italic" }

[window]
padding = { x = 4, y = 4 }
opacity = 0.95

[colors.primary]
background = "#0f121a"
foreground = "#eeeeee"

[colors.normal]
black = "#0f121a"
red = "#d27979"
green = "#79d279"
yellow = "#d2d279"
blue = "#79a5d2"
magenta = "#d279d2"
cyan = "#79d2d2"
white = "#808080"

[colors.bright]
black = "#0f121a"
red = "#d27979"
green = "#79d279"
yellow = "#d2d279"
blue = "#79a5d2"
magenta = "#d279d2"
cyan = "#79d2d2"
white = "#808080"

[colors.selection]
text = "CellForeground"
background = "#252937"
