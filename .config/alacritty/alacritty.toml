[env]
TERM = "alacritty"

[terminal]
shell = "/usr/bin/fish"

[font]
size = 12
offset = { x = 1, y = 1 }
normal = { family = "Hack Nerd Font", style="Regular" }
bold = { family = "Hack Nerd Font", style="Bold" }
italic = { family = "Hack Nerd Font", style="Italic" }
bold_italic = { family = "Hack Nerd Font", style="Bold Italic" }

[window]
padding = { x = 4, y = 4 }

[colors.primary]
background = "#1f222d"
foreground = "#f2f2f2"

[colors.normal]
black = "#aeafb6"
red = "#da6262"
green = "#62da62"
yellow = "#dada62"
blue = "#629eda"
magenta = "#9e62da"
cyan = "#62dada"
white = "#f2f2f2"

[colors.bright]
black = "#aeafb6"
red = "#da6262"
green = "#62da62"
yellow = "#dada62"
blue = "#629eda"
magenta = "#9e62da"
cyan = "#62dada"
white = "#f2f2f2"

[colors.selection]
text = "CellForeground"
background = "#414657"
