"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$username\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$package\
$character"""

[character]
success_symbol = '[➜](bold green)'

[username]
disabled = false
show_always = true

[directory]
disabled = false
